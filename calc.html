<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>田間噴藥調藥計算機</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1e272e; color: #fff; margin: 0; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 100vh; }
    
    /* 計算機液晶螢幕風格 */
    .screen { background: #2f3640; border: 3px solid #485460; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); }
    
    /* 大字輸入框（可直接點擊選擇） */
    .screen-box { background: #353b48; border: 2px solid #57606f; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .screen-box.active { border-color: #00d2d3; background: #182c39; box-shadow: 0 0 12px rgba(0,210,211,0.6); }
    
    .screen-title { font-size: 16px; color: #dcdde1; font-weight: bold; }
    .screen-val { font-size: 26px; font-weight: bold; color: #00d2d3; font-family: 'Courier New', monospace; }
    
    /* 計算結果大字區 */
    .result-box { background: #0f2027; border: 2px solid #10ac84; border-radius: 10px; padding: 14px; text-align: center; margin-top: 6px; }
    .result-title { font-size: 15px; color: #10ac84; font-weight: bold; }
    .result-num { font-size: 42px; font-weight: 900; color: #1dd1a1; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(29,209,161,0.3); }

    /* 網格按鈕排版 */
    .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
    
    /* 大按鈕通用樣式 */
    .btn { background: #353b48; color: #f5f6fa; border: none; padding: 18px 0; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #2f3640; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px #2f3640; }
    
    /* 數字鍵盤 */
    .btn-num { background: #485460; color: #fff; box-shadow: 0 4px #2f3640; }

    /* 功能鍵 (歸零 C) */
    .btn-clear { background: #ee5253; color: #fff; box-shadow: 0 4px #c8d6e5; font-size: 20px; }
    
    /* ENTER 換列鍵 */
    .btn-enter { background: #0984e3; color: #fff; box-shadow: 0 4px #74b9ff; font-size: 20px; }
  </style>
</head>
<body>

  <!-- 📟 液晶顯示螢幕 -->
  <div class="screen">
    <!-- 水量輸入框 (點擊直接切換) -->
    <div id="boxWater" class="screen-box active" onclick="setMode('water')">
      <span class="screen-title">🚰 噴藥總水量：</span>
      <span id="dispWater" class="screen-val">0 公升</span>
    </div>

    <!-- 倍數輸入框 (點擊直接切換) -->
    <div id="boxRatio" class="screen-box" onclick="setMode('ratio')">
      <span class="screen-title">🧪 稀釋倍數：</span>
      <span id="dispRatio" class="screen-val">0 倍</span>
    </div>

    <!-- 大字結果區 -->
    <div class="result-box">
      <div class="result-title">👉 建議加入藥劑 / 資材量</div>
      <div id="dispResult" class="result-num">0 cc</div>
    </div>
  </div>

  <!-- 🔢 數字大按鍵區 -->
  <div class="btn-grid">
    <button class="btn btn-num" onclick="pressNum(7)">7</button>
    <button class="btn btn-num" onclick="pressNum(8)">8</button>
    <button class="btn btn-num" onclick="pressNum(9)">9</button>

    <button class="btn btn-num" onclick="pressNum(4)">4</button>
    <button class="btn btn-num" onclick="pressNum(5)">5</button>
    <button class="btn btn-num" onclick="pressNum(6)">6</button>

    <button class="btn btn-num" onclick="pressNum(1)">1</button>
    <button class="btn btn-num" onclick="pressNum(2)">2</button>
    <button class="btn btn-num" onclick="pressNum(3)">3</button>

    <button class="btn btn-clear" onclick="clearCurrent()">C 清空</button>
    <button class="btn btn-num" onclick="pressNum(0)">0</button>
    <button class="btn btn-enter" onclick="pressEnter()">↵ ENTER</button>
  </div>

  <script>
    let currentMode = 'water'; // 'water' 或 'ratio'
    let waterVal = '0';
    let ratioVal = '0';

    function setMode(mode) {
      currentMode = mode;
      updateUI();
    }

    function updateUI() {
      const boxWater = document.getElementById('boxWater');
      const boxRatio = document.getElementById('boxRatio');

      if (currentMode === 'water') {
        boxWater.classList.add('active');
        boxRatio.classList.remove('active');
      } else {
        boxWater.classList.remove('active');
        boxRatio.classList.add('active');
      }
    }

    function pressNum(num) {
      if (currentMode === 'water') {
        if (waterVal === '0') waterVal = String(num);
        else waterVal += String(num);
      } else {
        if (ratioVal === '0') ratioVal = String(num);
        else ratioVal += String(num);
      }
      calculate();
    }

    function pressEnter() {
      // 按下 ENTER 鍵換下一個輸入列
      if (currentMode === 'water') {
        setMode('ratio');
      } else {
        setMode('water');
      }
    }

    function clearCurrent() {
      if (currentMode === 'water') waterVal = '0';
      else ratioVal = '0';
      calculate();
    }

    function calculate() {
      document.getElementById('dispWater').innerHTML = waterVal + ' 公升';
      document.getElementById('dispRatio').innerHTML = ratioVal + ' 倍';

      const w = parseFloat(waterVal);
      const r = parseFloat(ratioVal);
      const resultElem = document.getElementById('dispResult');

      if (w > 0 && r > 0) {
        // 公式：(水量 * 1000) / 倍數
        const cc = (w * 1000) / r;
        const finalCc = Math.round(cc * 10) / 10;
        resultElem.innerHTML = finalCc + ' cc ';
      } else {
        resultElem.innerHTML = '0 cc';
      }
    }
  </script>
</body>
</html>
